<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="chart-card">
    <p class="chart-title">Доходность предприятия по месяцам</p>

    <div class="chart-container">

        <div class="y-axis">
            <span>120k</span>
            <span>90k</span>
            <span>60k</span>
            <span>30k</span>
            <span>0</span>
        </div>

        <div class="chart">
            <div class="bars">
                <div class="bar-item"><div class="bar blue h-42"></div></div>
                <div class="bar-item"><div class="bar blue h-80"></div></div>
                <div class="bar-item"><div class="bar blue h-104"></div></div>
                <div class="bar-item"><div class="bar red h-96"></div></div>
                <div class="bar-item"><div class="bar blue h-107"></div></div>
                <div class="bar-item"><div class="bar red h-99"></div></div>
                <div class="bar-item"><div class="bar blue h-116"></div></div>
                <div class="bar-item"><div class="bar blue h-118"></div></div>
                <div class="bar-item"><div class="bar red h-105"></div></div>
                <div class="bar-item"><div class="bar red h-92"></div></div>
                <div class="bar-item"><div class="bar blue h-109"></div></div>
                <div class="bar-item"><div class="bar blue h-120"></div></div>
            </div>
            <div class="divider-x"></div>
            <div class="x-meta">
                <div class="meta-item"><span class="value">42k</span><span class="label">JAN</span></div>
                <div class="meta-item"><span class="value">80k</span><span class="label">FEB</span></div>
                <div class="meta-item"><span class="value">104k</span><span class="label">MAR</span></div>
                <div class="meta-item"><span class="value red-text">96k</span><span class="label">APR</span></div>
                <div class="meta-item"><span class="value">107k</span><span class="label">MAY</span></div>
                <div class="meta-item"><span class="value red-text">99k</span><span class="label">JUN</span></div>
                <div class="meta-item"><span class="value">116k</span><span class="label">JUL</span></div>
                <div class="meta-item"><span class="value">118k</span><span class="label">AUG</span></div>
                <div class="meta-item"><span class="value red-text">105k</span><span class="label">SEPT</span></div>
                <div class="meta-item"><span class="value red-text">92k</span><span class="label">OCT</span></div>
                <div class="meta-item"><span class="value">109k</span><span class="label">NOV</span></div>
                <div class="meta-item"><span class="value">120k</span><span class="label">DEC</span></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
